<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Análise - Experimento 2</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-body: #09090b; --bg-card: #09090b; --bg-panel: #18181b;
            --texto-principal: #f4f4f5; --texto-secundario: #a1a1aa; --borda: #27272a;
            --cor-nat: #3b82f6; --cor-bil: #60a5fa; --cor-ini: #f59e0b; --cor-abs: #ef4444; 
            --cor-dur: #10b981; --cor-esf: #ec4899; --cor-des: #8b5cf6; 
        }

        body, html { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background-color: var(--bg-body); color: var(--texto-principal); display: flex; justify-content: center; min-height: 100vh; box-sizing: border-box; padding: 40px 20px; }
        .dashboard { width: 100%; max-width: 1000px; display: none; } /* Escondido até carregar os dados */
        
        /* Loading Screen */
        #loading { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 60vh; width: 100%; color: var(--texto-secundario); font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; }
        .spinner { width: 40px; height: 40px; border: 4px solid var(--borda); border-top: 4px solid #fafafa; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .header { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 30px; border-bottom: 1px solid var(--borda); padding-bottom: 15px; }
        h1 { font-size: 1.5rem; font-weight: 600; margin: 0; letter-spacing: -0.02em; }
        .badge-n { color: var(--texto-secundario); font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; }

        .controls-container { display: grid; grid-template-columns: 1.5fr 1fr; gap: 20px; background: var(--bg-panel); padding: 20px; border-radius: 6px; border: 1px solid var(--borda); margin-bottom: 30px; }
        .control-group { display: flex; flex-direction: column; gap: 10px; }
        .control-group label { font-size: 0.75rem; color: var(--texto-secundario); font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; }
        
        select { background: var(--bg-body); color: var(--texto-principal); border: 1px solid var(--borda); padding: 10px 14px; border-radius: 4px; font-size: 0.95rem; cursor: pointer; outline: none; font-family: 'Inter', sans-serif; }
        .btn-group { display: flex; gap: 8px; }
        .btn-group button { flex: 1; background: var(--bg-body); color: var(--texto-secundario); border: 1px solid var(--borda); padding: 10px 14px; border-radius: 4px; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: all 0.2s; font-family: 'Inter', sans-serif; }
        .btn-group button:hover { background: #27272a; color: var(--texto-principal); }
        .btn-group button.active { background: #fafafa; color: #09090b; border-color: #fafafa; }

        .tabela-dados { width: 100%; border-collapse: collapse; margin-bottom: 30px; background-color: transparent; }
        .tabela-dados th, .tabela-dados td { padding: 16px; text-align: center; border-bottom: 1px solid var(--borda); }
        .tabela-dados th { color: var(--texto-secundario); font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; }
        .tabela-dados td { font-family: 'Inter', sans-serif; font-size: 1.1rem; font-weight: 400; }
        #valVas { font-weight: 700; color: #fafafa !important; }

        .card-grafico { position: relative; }
        .slider-wrapper { display: flex; align-items: center; gap: 20px; margin-bottom: 30px; position: relative; }
        .slider-wrapper span { font-size: 0.75rem; color: var(--texto-secundario); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; white-space: nowrap; }
        
        .vas-container { flex: 1; position: relative; }
        input[type=range] { -webkit-appearance: none; width: 100%; background: transparent; cursor: grab; position: relative; z-index: 5; outline: none; }
        input[type=range]::-webkit-slider-runnable-track { width: 100%; height: 2px; background: var(--borda); }
        .vas-container::before { content: ''; position: absolute; top: 12px; height: 12px; left: 50%; width: 1px; background: #52525b; transform: translateX(-50%); z-index: 1; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; height: 20px; width: 20px; border-radius: 50%; background: #fafafa; margin-top: -9px; transition: transform 0.1s; border: none; }
        input[type=range]::-webkit-slider-thumb:active { transform: scale(1.2); cursor: grabbing; }
        
        .grafico-wrapper { position: relative; height: 500px; width: 100%; border: 1px solid var(--borda); border-radius: 6px; padding: 20px; box-sizing: border-box; background: var(--bg-panel); }
        .rodape-legenda { text-align: center; font-size: 0.75rem; color: var(--texto-secundario); margin-top: 20px; letter-spacing: 0.05em; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="loading">
        <div class="spinner"></div>
        <div id="loading-text">Conectando ao Banco de Dados...</div>
    </div>

    <div class="dashboard" id="main-dashboard">
        <div class="header">
            <h1>Análise de Magnitude</h1>
            <span class="badge-n" id="badgeTotal">Dados Reais (N=0)</span>
        </div>

        <div class="controls-container">
            <div class="control-group">
                <label>Modo de Visualização</label>
                <div class="btn-group">
                    <button id="btnIndividual" class="active" onclick="setModo('individual')">Comparar Perfis</button>
                    <button id="btnIntegrada" onclick="setModo('integrada')">Comparar Variáveis</button>
                </div>
            </div>
            
            <div class="control-group" id="filtroContainer">
                <label id="labelFiltro">Analisar Variável:</label>
                <select id="selectFiltro" onchange="atualizarGrafico()"></select>
            </div>
        </div>

        <table class="tabela-dados">
            <thead>
                <tr id="rowLabels">
                    <th style="color: #fafafa;">Âncora VAS</th>
                    <th id="col1_label">Especialistas Nativos</th>
                    <th id="col2_label">Especialistas Bilíngues</th>
                    <th id="col3_label">Leigos Iniciantes</th>
                    <th id="col4_label" style="display:table-cell;">Leigos Absolutos</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td id="valVas">0.0</td>
                    <td id="val1">0.0</td>
                    <td id="val2">0.0</td>
                    <td id="val3">0.0</td>
                    <td id="val4" style="display:table-cell;">0.0</td>
                </tr>
            </tbody>
        </table>

        <div class="card-grafico">
            <div class="slider-wrapper">
                <span>Utilitário (-50)</span>
                <div class="vas-container">
                    <input type="range" id="vasSlider" min="-50" max="50" value="0" step="1">
                </div>
                <span>Estético (+50)</span>
            </div>
            
            <div class="grafico-wrapper">
                <canvas id="meuGrafico"></canvas>
            </div>
            <div class="rodape-legenda">Polo A (Utilitário) &nbsp;&nbsp;&nbsp;—&nbsp;&nbsp;&nbsp; Marco Zero &nbsp;&nbsp;&nbsp;—&nbsp;&nbsp;&nbsp; Polo B (Estético)</div>
        </div>
    </div>

    <script>
        // ── 1. CONFIGURAÇÃO DE ACESSO AOS DADOS ──
        // SUBSTITUA PELA SUA NOVA URL DO GOOGLE APPS SCRIPT
        const API_URL = "https://script.google.com/macros/s/AKfycbyAqlHbm4p8K7rme7cz_5RQjxc21GeQ3EsGXYL_mB7v7S5qrUi57YspXMuiT-M1m53K/exec";

        const perfis = ['Nativos', 'Bilíngues', 'Iniciantes', 'Absolutos'];
        const variaveis = ['Duração', 'Esforço', 'Deslocamento'];
        
        let mediasReais = {
            'Nativos': { 'Duração': 1, 'Esforço': 1, 'Deslocamento': 1 },
            'Bilíngues': { 'Duração': 1, 'Esforço': 1, 'Deslocamento': 1 },
            'Iniciantes': { 'Duração': 1, 'Esforço': 1, 'Deslocamento': 1 },
            'Absolutos': { 'Duração': 1, 'Esforço': 1, 'Deslocamento': 1 }
        };

        // ── 2. LÓGICA DE EXTRAÇÃO E PROCESSAMENTO (ETL) ──
        async function carregarDados() {
            try {
                const response = await fetch(API_URL);
                const dadosBrutos = await response.json();
                
                if(dadosBrutos.length > 0) {
                    processarMedias(dadosBrutos);
                    document.getElementById('badgeTotal').innerText = `Dados Reais (N=${dadosBrutos.length / 3})`; // Divide por 3 pois cada participante gera 3 linhas
                } else {
                    document.getElementById('loading-text').innerText = "Banco de dados vazio. Aguardando coletas.";
                    return;
                }

                document.getElementById('loading').style.display = 'none';
                document.getElementById('main-dashboard').style.display = 'block';
                
                setModo('individual');

            } catch (error) {
                document.getElementById('loading-text').innerText = "Erro ao conectar com a planilha. Verifique a URL do Script.";
                console.error(error);
            }
        }

        function processarMedias(dados) {
            // Agrupa e soma os valores absolutos do VAS por perfil e variável
            let somas = {}; let contagens = {};
            
            perfis.forEach(p => { somas[p] = {'Duração':0, 'Esforço':0, 'Deslocamento':0}; contagens[p] = {'Duração':0, 'Esforço':0, 'Deslocamento':0}; });

            dados.forEach(linha => {
                const p = linha.Perfil;
                if(somas[p] !== undefined) {
                    somas[p]['Duração'] += Math.abs(Number(linha.Duracao) || 0);
                    contagens[p]['Duração']++;
                    somas[p]['Esforço'] += Math.abs(Number(linha.Esforco) || 0);
                    contagens[p]['Esforço']++;
                    somas[p]['Deslocamento'] += Math.abs(Number(linha.Deslocamento) || 0);
                    contagens[p]['Deslocamento']++;
                }
            });

            // Calcula a média e converte em "Pseudo-Expoente" para plotagem da curva (Mapeamento Stevens Visual)
            // Se a média for 50 (máximo), a curva é reta (1.0). Quanto menor a percepção média, maior a curvatura.
            perfis.forEach(p => {
                variaveis.forEach(v => {
                    if(contagens[p][v] > 0) {
                        let mediaReal = somas[p][v] / contagens[p][v];
                        mediaReal = Math.max(mediaReal, 1); // Evita divisão por zero
                        mediasReais[p][v] = 50 / mediaReal; 
                    }
                });
            });
        }

        // ── 3. VISUALIZAÇÃO E GRÁFICOS ──
        let modoAtual = 'individual'; 
        let chartInstance = null;

        const paletaPerfis = { 'Nativos': '#3b82f6', 'Bilíngues': '#60a5fa', 'Iniciantes': '#f59e0b', 'Absolutos': '#ef4444' };
        const paletaVariaveis = { 'Duração': '#10b981', 'Esforço': '#ec4899', 'Deslocamento': '#8b5cf6' };

        function calcCurva(x, expoente) { return 100 * Math.pow(Math.abs(x) / 50, expoente); }

        function gerarDadosLinha(expoente) {
            const dados = [];
            for (let x = -50; x <= 50; x++) dados.push({ x: x, y: calcCurva(x, expoente) });
            return dados;
        }

        function setModo(modo) {
            modoAtual = modo;
            document.getElementById('btnIndividual').classList.toggle('active', modo === 'individual');
            document.getElementById('btnIntegrada').classList.toggle('active', modo === 'integrada');
            
            const select = document.getElementById('selectFiltro');
            select.innerHTML = '';
            
            if (modo === 'individual') {
                document.getElementById('labelFiltro').innerText = 'Variável Isolada:';
                variaveis.forEach(v => select.add(new Option(v, v)));
            } else {
                document.getElementById('labelFiltro').innerText = 'Perfil Isolado:';
                perfis.forEach(p => select.add(new Option(p, p)));
            }
            atualizarGrafico();
            atualizarTabela(document.getElementById('vasSlider').value);
        }

        const pluginLinhaCentral = {
            id: 'linhaCentral',
            beforeDraw(chart) {
                const { ctx, chartArea: { top, bottom }, scales: { x } } = chart;
                ctx.save();
                ctx.beginPath();
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
                ctx.lineWidth = 1;
                ctx.setLineDash([4, 4]);
                ctx.moveTo(x.getPixelForValue(0), top);
                ctx.lineTo(x.getPixelForValue(0), bottom);
                ctx.stroke();
                ctx.restore();
            }
        };

        function atualizarGrafico() {
            const selecao = document.getElementById('selectFiltro').value;
            const datasets = [];

            Chart.defaults.font.family = "'Inter', sans-serif";
            Chart.defaults.color = '#a1a1aa';

            if (modoAtual === 'individual') {
                perfis.forEach(p => {
                    datasets.push({
                        label: p, data: gerarDadosLinha(mediasReais[p][selecao]),
                        borderColor: paletaPerfis[p], borderWidth: 2, pointRadius: 0, pointHoverRadius: 6, tension: 0.4
                    });
                });
            } else {
                variaveis.forEach(v => {
                    datasets.push({
                        label: v, data: gerarDadosLinha(mediasReais[selecao][v]),
                        borderColor: paletaVariaveis[v], borderWidth: 2, pointRadius: 0, pointHoverRadius: 6, tension: 0.4
                    });
                });
            }

            if (chartInstance) {
                chartInstance.data.datasets = datasets;
                chartInstance.update();
            } else {
                const ctx = document.getElementById('meuGrafico').getContext('2d');
                chartInstance = new Chart(ctx, {
                    type: 'line', data: { datasets: datasets },
                    options: {
                        responsive: true, maintainAspectRatio: false,
                        interaction: { mode: 'index', intersect: false },
                        plugins: {
                            legend: { position: 'top', labels: { font: { size: 12, weight: '600' }, usePointStyle: true, boxWidth: 8 } },
                            tooltip: { backgroundColor: '#18181b', titleColor: '#f4f4f5', bodyColor: '#a1a1aa', borderColor: '#27272a', borderWidth: 1, padding: 12, cornerRadius: 4 }
                        },
                        scales: {
                            x: { type: 'linear', min: -50, max: 50, grid: { color: 'rgba(255, 255, 255, 0.03)' }, ticks: { font: { weight: '400' } } },
                            y: { min: 0, max: 100, grid: { color: 'rgba(255, 255, 255, 0.03)' } }
                        }
                    },
                    plugins: [pluginLinhaCentral]
                });
            }
        }

        function atualizarTabela(xVal) {
            xVal = parseFloat(xVal);
            document.getElementById('valVas').innerText = xVal > 0 ? "+" + xVal : xVal;
            const selecao = document.getElementById('selectFiltro').value;

            if (modoAtual === 'individual') {
                document.getElementById('col1_label').innerText = 'Nativos'; document.getElementById('col1_label').style.color = paletaPerfis['Nativos'];
                document.getElementById('col2_label').innerText = 'Bilíngues'; document.getElementById('col2_label').style.color = paletaPerfis['Bilíngues'];
                document.getElementById('col3_label').innerText = 'Iniciantes'; document.getElementById('col3_label').style.color = paletaPerfis['Iniciantes'];
                document.getElementById('col4_label').style.display = 'table-cell'; document.getElementById('col4_label').innerText = 'Absolutos'; document.getElementById('col4_label').style.color = paletaPerfis['Absolutos'];
                
                document.getElementById('val1').innerText = calcCurva(xVal, mediasReais['Nativos'][selecao]).toFixed(1);
                document.getElementById('val2').innerText = calcCurva(xVal, mediasReais['Bilíngues'][selecao]).toFixed(1);
                document.getElementById('val3').innerText = calcCurva(xVal, mediasReais['Iniciantes'][selecao]).toFixed(1);
                document.getElementById('val4').style.display = 'table-cell'; document.getElementById('val4').innerText = calcCurva(xVal, mediasReais['Absolutos'][selecao]).toFixed(1);
            } else {
                document.getElementById('col1_label').innerText = 'Duração'; document.getElementById('col1_label').style.color = paletaVariaveis['Duração'];
                document.getElementById('col2_label').innerText = 'Esforço'; document.getElementById('col2_label').style.color = paletaVariaveis['Esforço'];
                document.getElementById('col3_label').innerText = 'Deslocamento'; document.getElementById('col3_label').style.color = paletaVariaveis['Deslocamento'];
                document.getElementById('col4_label').style.display = 'none';
                
                document.getElementById('val1').innerText = calcCurva(xVal, mediasReais[selecao]['Duração']).toFixed(1);
                document.getElementById('val2').innerText = calcCurva(xVal, mediasReais[selecao]['Esforço']).toFixed(1);
                document.getElementById('val3').innerText = calcCurva(xVal, mediasReais[selecao]['Deslocamento']).toFixed(1);
                document.getElementById('val4').style.display = 'none';
            }
        }

        document.getElementById('vasSlider').addEventListener('input', function() {
            atualizarTabela(this.value);
            const index = parseFloat(this.value) + 50; 
            chartInstance.setActiveElements([{datasetIndex: 0, index: index}]);
            chartInstance.update();
        });

        // Inicia carregamento dos dados da nuvem
        window.onload = carregarDados;

    </script>
</body>
</html>
